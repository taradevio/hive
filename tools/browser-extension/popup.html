<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #fff;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    header span { font-size: 18px; }
    header h3 { font-size: 13px; font-weight: 600; color: #FAC43B; }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #ccc;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.on  { background: #4ade80; }
    .dot.off { background: #f87171; }
    .hint {
      margin-top: 10px;
      font-size: 10px;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <header>
    <span>🐝</span>
    <h3>Hive Browser Bridge</h3>
  </header>
  <div class="row">
    <div class="dot off" id="dot"></div>
    <span id="label">Checking…</span>
  </div>
  <div class="hint" id="hint"></div>
  <script src="popup.js"></script>
</body>
</html>
